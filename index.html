<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部署测试页面</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: #222;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .title {
            text-align: center;
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .test-item {
            margin: 15px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            border-left: 4px solid #1976d2;
        }
        
        .success { border-left-color: #4caf50; }
        .warning { border-left-color: #ff9800; }
        .error { border-left-color: #f44336; }
        
        .btn {
            background: #1976d2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn:hover {
            background: #1565c0;
            transform: translateY(-2px);
        }
        
        .status {
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-left: 10px;
        }
        
        .status.pass { background: #d4edda; color: #155724; }
        .status.fail { background: #f8d7da; color: #721c24; }
        .status.pending { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🚀 部署测试页面</h1>
        
        <div class="test-item">
            <h3>📋 部署前检查清单</h3>
            <div id="deploymentChecks">
                <p>正在检查部署状态...</p>
            </div>
        </div>
        
        <div class="test-item">
            <h3>🔗 页面链接测试</h3>
            <div id="linkTests">
                <p>正在测试页面链接...</p>
            </div>
        </div>
        
        <div class="test-item">
            <h3>💾 本地存储测试</h3>
            <div id="storageTests">
                <p>正在测试本地存储功能...</p>
            </div>
        </div>
        
        <div class="test-item">
            <h3>📱 响应式测试</h3>
            <div id="responsiveTests">
                <p>屏幕尺寸: <span id="screenSize"></span></p>
                <p>设备类型: <span id="deviceType"></span></p>
                <p>用户代理: <span id="userAgent"></span></p>
            </div>
        </div>
        
        <div class="test-item">
            <h3>🎯 功能测试</h3>
            <button class="btn" onclick="runAllTests()">运行完整测试</button>
            <button class="btn" onclick="testBasicFunctions()">测试基础功能</button>
            <a href="index.html" class="btn">返回主页</a>
            <a href="diagnose-index.html" class="btn">问题诊断</a>
        </div>
        
        <div class="test-item">
            <h3>📊 测试结果</h3>
            <div id="testResults">
                点击上方按钮开始测试...
            </div>
        </div>
    </div>

    <script>
        console.log('🧪 部署测试页面加载');
        
        // 页面加载完成后自动运行基础检查
        document.addEventListener('DOMContentLoaded', function() {
            runDeploymentChecks();
            runLinkTests();
            runStorageTests();
            updateDeviceInfo();
        });
        
        function runDeploymentChecks() {
            const checksContainer = document.getElementById('deploymentChecks');
            let checksHtml = '';
            
            // 检查基础环境
            const checks = [
                {
                    name: '页面加载',
                    test: () => document.readyState === 'complete',
                    status: document.readyState === 'complete' ? 'pass' : 'pending'
                },
                {
                    name: 'localStorage支持',
                    test: () => typeof(Storage) !== "undefined",
                    status: typeof(Storage) !== "undefined" ? 'pass' : 'fail'
                },
                {
                    name: '网络连接',
                    test: () => navigator.onLine,
                    status: navigator.onLine ? 'pass' : 'fail'
                },
                {
                    name: 'CSS样式加载',
                    test: () => getComputedStyle(document.body).fontFamily.includes('PingFang') || getComputedStyle(document.body).fontFamily.includes('Microsoft YaHei'),
                    status: 'pass' // 假设通过，因为页面显示正常
                }
            ];
            
            checks.forEach(check => {
                checksHtml += `
                    <p>${check.name}: <span class="status ${check.status}">${check.status.toUpperCase()}</span></p>
                `;
            });
            
            checksContainer.innerHTML = checksHtml;
        }
        
        function runLinkTests() {
            const linksContainer = document.getElementById('linkTests');
            const links = [
                'index.html',
                'day_plan.html',
                'week_plan.html',
                'month_plan.html',
                'habit_tracker.html',
                'reflection_template.html'
            ];
            
            let linksHtml = '';
            let testCount = 0;
            
            links.forEach(link => {
                fetch(link)
                    .then(response => {
                        const status = response.ok ? 'pass' : 'fail';
                        linksHtml += `<p>${link}: <span class="status ${status}">${status.toUpperCase()}</span></p>`;
                        testCount++;
                        if (testCount === links.length) {
                            linksContainer.innerHTML = linksHtml;
                        }
                    })
                    .catch(error => {
                        linksHtml += `<p>${link}: <span class="status fail">FAIL</span></p>`;
                        testCount++;
                        if (testCount === links.length) {
                            linksContainer.innerHTML = linksHtml;
                        }
                    });
            });
        }
        
        function runStorageTests() {
            const storageContainer = document.getElementById('storageTests');
            let storageHtml = '';
            
            try {
                // 测试localStorage
                localStorage.setItem('test', 'value');
                const value = localStorage.getItem('test');
                localStorage.removeItem('test');
                
                if (value === 'value') {
                    storageHtml += '<p>localStorage读写: <span class="status pass">PASS</span></p>';
                } else {
                    storageHtml += '<p>localStorage读写: <span class="status fail">FAIL</span></p>';
                }
                
                // 检查现有数据
                const dayPlans = localStorage.getItem('planData_day');
                const weekPlans = localStorage.getItem('planData_week');
                const monthPlans = localStorage.getItem('planData_month');
                
                storageHtml += `<p>日计划数据: ${dayPlans ? '存在' : '无'}</p>`;
                storageHtml += `<p>周计划数据: ${weekPlans ? '存在' : '无'}</p>`;
                storageHtml += `<p>月计划数据: ${monthPlans ? '存在' : '无'}</p>`;
                
                // 存储空间信息
                const storageSize = JSON.stringify(localStorage).length;
                storageHtml += `<p>存储使用量: ${(storageSize / 1024).toFixed(2)} KB</p>`;
                
            } catch (error) {
                storageHtml += `<p>存储测试失败: <span class="status fail">FAIL</span></p>`;
                storageHtml += `<p>错误: ${error.message}</p>`;
            }
            
            storageContainer.innerHTML = storageHtml;
        }
        
        function updateDeviceInfo() {
            document.getElementById('screenSize').textContent = `${screen.width}x${screen.height}`;
            document.getElementById('deviceType').textContent = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ? '移动设备' : '桌面设备';
            document.getElementById('userAgent').textContent = navigator.userAgent.substring(0, 100) + '...';
        }
        
        function testBasicFunctions() {
            const resultsContainer = document.getElementById('testResults');
            let results = '<h4>基础功能测试结果:</h4>';
            
            // 测试日期工具
            try {
                const today = new Date().toISOString().split('T')[0];
                results += `<p>日期获取: ${today} <span class="status pass">PASS</span></p>`;
            } catch (error) {
                results += `<p>日期获取: <span class="status fail">FAIL</span></p>`;
            }
            
            // 测试存储工具
            try {
                const testData = { test: true, timestamp: new Date().toISOString() };
                localStorage.setItem('test_plan', JSON.stringify(testData));
                const loaded = JSON.parse(localStorage.getItem('test_plan'));
                
                if (loaded && loaded.test) {
                    results += `<p>数据存储: <span class="status pass">PASS</span></p>`;
                } else {
                    results += `<p>数据存储: <span class="status fail">FAIL</span></p>`;
                }
                
                localStorage.removeItem('test_plan');
            } catch (error) {
                results += `<p>数据存储: <span class="status fail">FAIL - ${error.message}</span></p>`;
            }
            
            // 测试DOM操作
            try {
                const testDiv = document.createElement('div');
                testDiv.innerHTML = '测试';
                document.body.appendChild(testDiv);
                document.body.removeChild(testDiv);
                results += `<p>DOM操作: <span class="status pass">PASS</span></p>`;
            } catch (error) {
                results += `<p>DOM操作: <span class="status fail">FAIL</span></p>`;
            }
            
            resultsContainer.innerHTML = results;
        }
        
        function runAllTests() {
            const resultsContainer = document.getElementById('testResults');
            resultsContainer.innerHTML = '<h4>正在运行完整测试...</h4>';
            
            setTimeout(() => {
                testBasicFunctions();
                
                // 添加综合评估
                let assessment = '<hr><h4>综合评估:</h4>';
                const passCount = (resultsContainer.innerHTML.match(/PASS/g) || []).length;
                const failCount = (resultsContainer.innerHTML.match(/FAIL/g) || []).length;
                
                if (failCount === 0) {
                    assessment += '<p style="color: #4caf50; font-weight: bold;">✅ 所有测试通过，系统可以部署到GitHub Pages！</p>';
                } else if (failCount <= 2) {
                    assessment += '<p style="color: #ff9800; font-weight: bold;">⚠️ 大部分功能正常，可以部署，但建议修复失败项。</p>';
                } else {
                    assessment += '<p style="color: #f44336; font-weight: bold;">❌ 存在多个问题，建议修复后再部署。</p>';
                }
                
                assessment += `<p>通过: ${passCount}, 失败: ${failCount}</p>`;
                resultsContainer.innerHTML += assessment;
            }, 1000);
        }
    </script>
</body>
</html>
